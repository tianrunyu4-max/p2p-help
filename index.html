<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>1+1</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #fff; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #fff;
        transition: opacity 0.3s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      .splash-logo {
        width: 88px; height: 88px; border-radius: 22px;
        background: linear-gradient(135deg, #f0a500, #ffc700);
        display: flex; align-items: center; justify-content: center;
        font-size: 44px; margin-bottom: 20px;
        box-shadow: 0 8px 24px rgba(240,165,0,0.35);
      }
      .splash-title { font-size: 28px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
      .splash-sub { font-size: 14px; color: #999; margin-bottom: 40px; }
      .splash-dots { display: flex; gap: 8px; }
      .splash-dots span {
        width: 8px; height: 8px; border-radius: 50%;
        background: #f0a500;
        animation: dot-bounce 1.2s infinite ease-in-out;
      }
      .splash-dots span:nth-child(2) { animation-delay: .2s; }
      .splash-dots span:nth-child(3) { animation-delay: .4s; }
      @keyframes dot-bounce {
        0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
        30% { transform: translateY(-8px); opacity: 1; }
      }
      /* 断网提示 */
      #offline-tip {
        display: none; position: fixed; inset: 0; z-index: 99999;
        flex-direction: column; align-items: center; justify-content: center;
        background: #fff;
      }
      #offline-tip.show { display: flex; }
      #offline-tip .offline-icon { font-size: 56px; margin-bottom: 16px; }
      #offline-tip h2 { font-size: 20px; font-weight: 700; color: #333; margin-bottom: 8px; }
      #offline-tip p { font-size: 14px; color: #999; margin-bottom: 24px; }
      #offline-tip button {
        padding: 12px 32px; background: #f0a500; color: #fff;
        border: none; border-radius: 24px; font-size: 16px;
        font-weight: 600; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <!-- 加载屏：JS加载完成前一直显示 -->
    <div id="splash">
      <div class="splash-logo">🤝</div>
      <div class="splash-title">1+1</div>
      <div class="splash-sub">点对点 · 直接打款 · 全程透明</div>
      <div class="splash-dots"><span></span><span></span><span></span></div>
    </div>

    <!-- 断网提示 -->
    <div id="offline-tip">
      <div class="offline-icon">📡</div>
      <h2>网络连接失败</h2>
      <p>请检查网络后重试</p>
      <button onclick="window.location.reload()">重新加载</button>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>

    <script>
      // 断网检测：5秒内Vue未挂载则提示断网
      var _splashTimer = setTimeout(function() {
        if (document.getElementById('app').children.length === 0) {
          document.getElementById('offline-tip').classList.add('show');
          document.getElementById('splash').style.display = 'none';
        }
      }, 5000);
      window._clearSplashTimer = function() { clearTimeout(_splashTimer); };
    </script>
  </body>
</html>
